<!-- Connexion - Éléphant Bourse -->
<!DOCTYPE html>
<html class="light" lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Éléphant Bourse - Connexion</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "secondary-container": "#7bf7b0",
          "background": "#f9f9fc",
          "surface-bright": "#f9f9fc",
          "surface-variant": "#e2e2e5",
          "on-secondary": "#ffffff",
          "surface-container": "#eeeef0",
          "on-secondary-fixed-variant": "#00522f",
          "surface-container-lowest": "#ffffff",
          "tertiary": "#5d5f5f",
          "tertiary-fixed": "#e2e2e2",
          "surface-container-highest": "#e2e2e5",
          "inverse-primary": "#ffb785",
          "secondary": "#006d40",
          "on-error-container": "#93000a",
          "error-container": "#ffdad6",
          "primary-fixed-dim": "#ffb785",
          "primary-fixed": "#ffdcc6",
          "secondary-fixed": "#7efab3",
          "tertiary-container": "#a3a4a4",
          "surface-dim": "#dadadc",
          "surface-container-high": "#e8e8ea",
          "on-tertiary-container": "#383a3b",
          "on-tertiary-fixed": "#1a1c1c",
          "surface-container-low": "#f3f3f6",
          "secondary-fixed-dim": "#61dd98",
          "on-surface-variant": "#574235",
          "surface-tint": "#954a00",
          "on-surface": "#1a1c1e",
          "inverse-surface": "#2f3133",
          "primary-container": "#ff8200",
          "primary": "#954a00",
          "surface": "#f9f9fc",
          "outline": "#8b7263",
          "on-tertiary-fixed-variant": "#454747",
          "on-primary-fixed-variant": "#723700",
          "tertiary-fixed-dim": "#c6c6c7",
          "on-error": "#ffffff",
          "on-tertiary": "#ffffff",
          "inverse-on-surface": "#f0f0f3",
          "on-primary": "#ffffff",
          "on-primary-fixed": "#301400",
          "on-primary-container": "#5f2c00",
          "error": "#ba1a1a",
          "outline-variant": "#dec1af",
          "on-secondary-container": "#007244",
          "on-background": "#1a1c1e",
          "on-secondary-fixed": "#002110"
        },
        borderRadius: {
          "DEFAULT": "0.125rem",
          "lg": "0.25rem",
          "xl": "0.5rem",
          "full": "0.75rem"
        },
        fontFamily: {
          "display-lg": ["Inter"],
          "body-sm": ["Inter"],
          "headline-lg-mobile": ["Inter"],
          "headline-lg": ["Inter"],
          "label-md": ["JetBrains Mono"],
          "educational-quote": ["Inter"],
          "body-lg": ["Inter"],
          "title-md": ["Inter"]
        },
        fontSize: {
          "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
          "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
          "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
          "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
          "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
          "educational-quote": ["18px", {"lineHeight": "28px", "fontWeight": "500"}],
          "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
          "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .glass-effect {
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .elephant-grid-pattern {
    background-image: radial-gradient(rgba(0, 158, 96, 0.05) 1px, transparent 1px);
    background-size: 24px 24px;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim-1 { animation: fadeInUp 0.7s ease both; }
  .anim-2 { animation: fadeInUp 1s ease 0.15s both; }
  .anim-3 { animation: fadeInUp 1s ease 0.3s both; }
  .anim-4 { animation: fadeInUp 0.7s ease 0.5s both; }
</style>
</head>
<body class="bg-background font-body-lg text-on-surface min-h-screen flex flex-col items-center justify-center p-4 md:p-16 overflow-hidden relative elephant-grid-pattern">

  <!-- Top Glow -->
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-lg h-64 bg-primary-container/10 blur-[120px] rounded-full pointer-events-none"></div>

  <main class="w-full max-w-sm flex flex-col items-center z-10">

    <!-- Logo -->
    <div class="mb-12 anim-1">
      <div class="w-32 h-32 flex items-center justify-center">
        <!-- Elephant SVG Logo -->
        <svg viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full drop-shadow-sm">
          <circle cx="64" cy="64" r="64" fill="#ffdcc6"/>
          <ellipse cx="64" cy="72" rx="30" ry="26" fill="#954a00"/>
          <ellipse cx="50" cy="60" rx="14" ry="18" fill="#954a00"/>
          <ellipse cx="78" cy="60" rx="14" ry="18" fill="#954a00"/>
          <ellipse cx="50" cy="58" rx="10" ry="14" fill="#ff8200"/>
          <ellipse cx="78" cy="58" rx="10" ry="14" fill="#ff8200"/>
          <ellipse cx="64" cy="70" rx="22" ry="20" fill="#ff8200"/>
          <!-- Eyes -->
          <circle cx="57" cy="62" r="3" fill="#301400"/>
          <circle cx="71" cy="62" r="3" fill="#301400"/>
          <circle cx="58" cy="61" r="1" fill="white"/>
          <circle cx="72" cy="61" r="1" fill="white"/>
          <!-- Trunk -->
          <path d="M64 80 Q58 92 54 96 Q50 100 52 102 Q56 104 60 98 Q64 92 64 80Z" fill="#954a00"/>
          <!-- Ears -->
          <ellipse cx="36" cy="56" rx="12" ry="16" fill="#ffb785"/>
          <ellipse cx="92" cy="56" rx="12" ry="16" fill="#ffb785"/>
          <!-- Chart bars on body -->
          <rect x="54" y="74" width="5" height="8" rx="1" fill="#006d40" opacity="0.7"/>
          <rect x="61" y="70" width="5" height="12" rx="1" fill="#006d40" opacity="0.9"/>
          <rect x="68" y="72" width="5" height="10" rx="1" fill="#006d40" opacity="0.8"/>
        </svg>
      </div>
    </div>

    <!-- Welcome Text -->
    <div class="text-center mb-10 px-4 space-y-3 anim-2">
      <h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">
        Bienvenue sur Éléphant Bourse
      </h1>
      <p class="font-body-lg text-tertiary leading-relaxed">
        Votre passerelle vers le marché financier ivoirien.
      </p>
    </div>

    <!-- Login Actions -->
    <div class="w-full space-y-4 anim-3">
      <!-- Google Sign-In -->
      <button onclick="window.location.href='index.html'" class="w-full flex items-center justify-center gap-4 bg-white border border-outline-variant py-4 px-6 rounded-xl hover:bg-surface-container-low active:scale-[0.98] transition-all duration-200 shadow-sm">
        <svg fill="none" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.26 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span class="font-title-md text-body-lg font-semibold text-on-surface">Se connecter avec Google</span>
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-4 py-2">
        <div class="h-px flex-grow bg-outline-variant/50"></div>
        <span class="font-label-md text-label-md text-outline uppercase tracking-widest">OU</span>
        <div class="h-px flex-grow bg-outline-variant/50"></div>
      </div>

      <!-- Email Login -->
      <button onclick="window.location.href='index.html'" class="w-full flex items-center justify-center gap-2 bg-secondary border border-secondary text-white py-4 px-6 rounded-xl hover:bg-secondary-fixed-dim hover:text-on-background transition-colors active:scale-[0.98] duration-200">
        <span class="material-symbols-outlined" style="font-size:20px;">mail</span>
        <span class="font-title-md text-body-lg font-semibold">Continuer avec l'e-mail</span>
      </button>
    </div>

    <!-- Trust Indicator -->
    <div class="mt-12 glass-effect p-4 rounded-xl border border-outline-variant/30 flex items-start gap-3 max-w-xs anim-4">
      <span class="material-symbols-outlined text-primary-container" style="flex-shrink:0;">verified_user</span>
      <p class="font-body-sm text-body-sm text-on-surface-variant">
        Votre sécurité est notre priorité. Vos données sont chiffrées selon les standards bancaires.
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="mt-auto w-full max-w-sm flex flex-col items-center gap-4 py-8 anim-4">
    <div class="flex items-center gap-6">
      <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Besoin d'aide ?</a>
      <div class="w-1 h-1 rounded-full bg-outline-variant"></div>
      <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Conditions d'utilisation</a>
    </div>
    <p class="font-label-md text-[10px] text-tertiary uppercase tracking-tighter opacity-50">
      © 2024 Éléphant Bourse • Côte d'Ivoire
    </p>
  </footer>

  <!-- Background Decorative Elements -->
  <div class="fixed bottom-0 right-0 w-64 h-64 bg-secondary/5 blur-[100px] rounded-full -mb-32 -mr-32 pointer-events-none"></div>
  <div class="fixed top-1/4 left-0 w-32 h-32 bg-primary/5 blur-[60px] rounded-full -ml-16 pointer-events-none"></div>
</body>
</html>
