name: Android & Backend Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make Gradle wrapper executable
      run: chmod +x gradlew

    - name: Build Android App (Debug APK)
      run: ./gradlew assembleDebug --no-daemon --no-configuration-cache

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: BAOU-App-Debug
        path: app/build/outputs/apk/debug/app-debug.apk

  build-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    - name: Verify Server Script
      run: |
        cd backend
        node -c server.js
